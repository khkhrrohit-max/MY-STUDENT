function showNotes() {

    const sem = document.getElementById("sem").value;
    const noteList = document.getElementById("noteList");

    noteList.innerHTML = "";

    if (!sem) return;

    notes[sem].forEach(note => {

        noteList.innerHTML += `
        <div class="note">
            <span>${note.name}</span>

            <a href="${note.file}" target="_blank">
                <button>Open PDF</button>
            </a>

           

        </div>`;
    });
