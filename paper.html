function showPapers() {

    const sem = document.getElementById("sem").value;
    const paperList = document.getElementById("paperList");

    paperList.innerHTML = "";

    if (!sem) return;

    papers[sem].forEach(paper => {

        paperList.innerHTML += `
        <div class="paper">
            <span>${paper.name}</span>

            <a href="${paper.file}" target="_blank">
                <button>Open PDF</button>
            </a>

       

        </div>`;
    });
}
