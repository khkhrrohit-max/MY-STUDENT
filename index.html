<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY STUDENT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    background:#000814;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    width:100%;
    padding:20px;
}
/* Background */

.bg{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.bg span{
position:absolute;
display:block;
width:3px;
height:3px;
background:#00eaff;
border-radius:50%;
animation:move 8s linear infinite;
box-shadow:
0 0 10px #00eaff,
0 0 20px #00eaff,
0 0 40px #00eaff;
}

@keyframes move{

0%{
transform:translateY(100vh) scale(0);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-100vh) scale(2);
opacity:0;
}

}

/* Center */

.center{
    z-index:10;
    text-align:center;
    width:100%;
    max-width:700px;
    padding:20px;
  animation:floatCenter 5s ease-in-out infinite;

}

@keyframes floatCenter{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}
}

/* Logo */

.logo{

width:clamp(90px,18vw,170px);
height:clamp(90px,18vw,170px);

margin:auto;
border-radius:50%;

background:linear-gradient(135deg,#00eaff,#0066ff,#7b2fff);

display:flex;
justify-content:center;
align-items:center;

font-size:clamp(40px,7vw,70px);
font-weight:bold;
color:white;

box-shadow:
0 0 30px cyan,
0 0 60px blue,
0 0 120px cyan;

animation:
pop 1.2s ease,
pulse 2s infinite;

}

@keyframes pop{

0%{
transform:scale(.2) rotate(-360deg);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

@keyframes pulse{

0%,100%{
box-shadow:
0 0 20px cyan,
0 0 60px blue;
}

50%{
box-shadow:
0 0 50px cyan,
0 0 120px blue,
0 0 180px cyan;
}

}

/* Title */

h1{

margin-top:30px;

font-size:clamp(32px,7vw,65px);

font-weight:900;

letter-spacing:clamp(2px,1vw,8px);

line-height:1.2;

background:linear-gradient(90deg,#00eaff,#ffffff,#00eaff);
background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 2s linear infinite;

}

@keyframes shine{

0%{background-position:0%;}
100%{background-position:300%;}

}

/* Subtitle */

p{

margin-top:15px;

font-size:clamp(16px,2.5vw,24px);

letter-spacing:clamp(1px,.6vw,4px);

color:#d8e6ff;

opacity:0;

animation:fade 1s forwards;

animation-delay:.8s;

}

@keyframes fade{

to{

opacity:1;

}

}

/* Loading */

.loading{

width:min(90%,420px);

height:10px;

margin:40px auto;

border-radius:20px;

background:#222;

overflow:hidden;

box-shadow:0 0 15px cyan;

}

.bar{

height:100%;
width:0%;

background:linear-gradient(90deg,#00eaff,#00ff99,#00eaff);

animation:load 3.5s linear forwards;

}

@keyframes load{

100%{

width:100%;

}

}

/* Creator */

.creator{

position:absolute;

bottom:25px;

left:50%;

transform:translateX(-50%);

font-size:clamp(12px,2vw,18px);

color:#ffffff90;

letter-spacing:2px;

text-align:center;

animation:blink 2s infinite;

padding:0 15px;

}

@keyframes blink{

50%{

opacity:.3;

}

}
  <style>

/* Your existing CSS */

*{
...
}

body{
...
}

/* All your other CSS */

@keyframes blink{

50%{
opacity:.3;
}

}

/* ============================= */
/* STEP 10 - Responsive CSS */
/* ============================= */

/* Tablet */

@media (max-width:992px){

.loading{
height:8px;
}

}

/* Mobile */

@media (max-width:768px){

body{
padding:15px;
}

.creator{
bottom:15px;
}

}

/* Small Phones */

@media (max-width:480px){

.loading{
height:6px;
}

.logo{
box-shadow:
0 0 20px cyan,
0 0 40px blue;
}

}

</style>

</style>

</head>

<body>

<div class="bg" id="bg"></div>

<div class="center">

<div class="logo">
🎓
</div>

<h1>MY STUDENT</h1>

<p>Student Portal</p>

<div class="loading">

<div class="bar"></div>

</div>

</div>

<div class="creator">
Developed By RK
</div>

<script>

/* Floating particles */

const bg=document.getElementById("bg");

const particles = window.innerWidth < 768 ? 60 : 120;

for(let i=0;i<particles;i++){

let s=document.createElement("span");

s.style.left=Math.random()*100+"%";

s.style.animationDuration=4+Math.random()*6+"s";

s.style.animationDelay=Math.random()*5+"s";

s.style.opacity=Math.random();

bg.appendChild(s);

}

/* Redirect */

setTimeout(()=>{

window.location.href="signup.html";

},4000);

</script>

</body>
</html>
