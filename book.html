function showBooks() {

    const sem = document.getElementById("sem").value;
    const bookList = document.getElementById("bookList");

    bookList.innerHTML = "";

    if (!sem) return;

    books[sem].forEach(book => {

        bookList.innerHTML += `
        <div class="book">
            <span>${book.name}</span>

            <a href="${book.file}" target="_blank">
                <button>Open PDF</button>
            </a>

    
        </div>`;
    });
}
